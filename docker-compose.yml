version: "3.9"

services:
  auth-service:
    image: elib-auth:latest
    container_name: elib-auth
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production

  catalog-service:
    image: elib-catalog:latest
    container_name: elib-catalog
    ports:
      - "8082:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production

  borrow-service:
    image: elib-borrow:latest
    container_name: elib-borrow
    ports:
      - "8083:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production

  web:
    image: elib-web:latest
    container_name: elib-web
    ports:
      - "8080:8080"