apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secretStore.name }}
  namespace: {{ include "elib-chart.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ include "elib-chart.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  db-host: {{ .Values.secrets.common.dbHost | quote }}
  db-user: {{ .Values.secrets.common.dbUser | quote }}
  db-password: {{ .Values.secrets.common.dbPassword | quote }}

  auth-connection-string: {{ printf "Server=%s;Port=%s;Database=%s;User=%s;Password=%s;SslMode=Required;" .Values.secrets.common.dbHost .Values.auth.env.Database__Port .Values.auth.env.Database__Name .Values.secrets.common.dbUser .Values.secrets.common.dbPassword | quote }}
  catalog-connection-string: {{ printf "Server=%s;Port=%s;Database=%s;User=%s;Password=%s;SslMode=Required;" .Values.secrets.common.dbHost .Values.catalog.env.Database__Port .Values.catalog.env.Database__Name .Values.secrets.common.dbUser .Values.secrets.common.dbPassword | quote }}
  borrow-connection-string: {{ printf "Server=%s;Port=%s;Database=%s;User=%s;Password=%s;SslMode=Required;" .Values.secrets.common.dbHost .Values.borrow.env.Database__Port .Values.borrow.env.Database__Name .Values.secrets.common.dbUser .Values.secrets.common.dbPassword | quote }}

  jwt-kid: {{ .Values.secrets.auth.jwtKid | quote }}
  jwt_private.pem: |
{{ .Values.secrets.auth.jwtPrivatePem | indent 4 }}
  jwt_public.pem: |
{{ .Values.secrets.auth.jwtPublicPem | indent 4 }}